<script>
'use strict';

// ── Config ───────────────────────────────────────────────────
const CFG = {
  APP_VERSION: '6.5',
  REFRESH_INTERVAL_SEC: 1200,
  OI_PERIOD: '4h', OI_LIMIT: 42,
  KLINES_MAIN: 210, KLINES_FVG: 100,
  KLINES_5D: 30,   KLINES_14D: 84, KLINES_30D: 180,
  FLOW_LIMIT: 24,
  RSI_PERIOD: 14,  ATR_PERIOD: 14,
  EMA_FAST: 50,    EMA_SLOW: 200,
  STRUCT_LOOKBACK_4H: 20, STRUCT_LOOKBACK_30D: 40,
  FVG_MAX_GAPS: 5,
  DONCHIAN_PERIOD_SHORT: 20, DONCHIAN_PERIOD_LONG: 55,
  DONCHIAN_BREAK_BUFFER_PCT: 0.25,
  SQUEEZE: { BB_WIDTH_MAX: 5.0, DC_ATR_RATIO_MAX: 1.0 },
  RSI_OB: 70, RSI_OS: 30, RSI_EXTREME_OB: 75, RSI_EXTREME_OS: 25,
  FLOW_STRONG: 5.0, FLOW_PARTIAL: 2.0,
  OI_SQUEEZE_HIGH: 10.0, OI_SQUEEZE_MED: 5.0,
  POC_NEAR_PCT: 0.5, FVG_NEAR_PCT: 1.0, FVG_ENTRY_PCT: 2.0, POC_CONFLUENCE_PCT: 1.0,
  VOL_SPIKE_MULT: 2.0, VOL_AVG_WINDOW: 20,
  SCORE_BOT_MIN: 7.5, CVD_LATERAL_RATIO: 0.2,
  SL_ATR_MULT: 1.5, TP1_ATR_MULT: 3.0, TP2_ATR_MULT: 5.25,
};

const BINANCE_BASE = 'https://fapi.binance.com';
const BYBIT_BASE   = 'https://api.bybit.com';
const BB_INT       = { '4h':'240','1h':'60','15m':'15','5m':'5','1d':'D' };

const DEFAULT_SYMBOLS = {
  BTC:'BTCUSDT', ETH:'ETHUSDT', SOL:'SOLUSDT', BNB:'BNBUSDT',
  XRP:'XRPUSDT', DOGE:'DOGEUSDT', LINK:'LINKUSDT',
};

const SYMBOL_NAMES = {
  BTC:'Bitcoin',ETH:'Ethereum',SOL:'Solana',BNB:'BNB',
  XRP:'XRP',DOGE:'Dogecoin',AVAX:'Avalanche',LINK:'Chainlink',
  SUI:'Sui',TRX:'TRON',HYPE:'Hyperliquid',XLM:'Stellar',
};

const INDICATOR_GLOSSARY = [
  ['RSI (14)','Momentum on 4H. >70 overbought, <30 oversold.'],
  ['ATR (14)','4H Average True Range. SL = 1.5–2×ATR.'],
  ['Flow% 24h','Buy vs sell pressure on 1H ×24. ±5% = strong.'],
  ['POC 5d/14d','Max-volume price zone. Confluence = strong S/R.'],
  ['AVWAP','Volume-weighted avg price across 5/14/30 days.'],
  ['CVD','Cumulative Volume Delta. ACC/DIS/LAT labels.'],
  ['EMA 50/200','Standard trend filter (golden/death cross).'],
  ['FVG','Fair Value Gap — institutional imbalance. ★ = confirmed.'],
  ['Donchian 20/55','Range regime marker. Breakout = trend start.'],
  ['Regime','Composite: ADX + BB + DC20.'],
];

// ── API ──────────────────────────────────────────────────────
async function tryFetch(url, timeout = 12000) {
  const fp = fetch(url).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
  const tp = new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout')), timeout));
  return Promise.race([fp, tp]);
}

const B = {
  ticker:        s => tryFetch(BINANCE_BASE + '/fapi/v1/ticker/price?symbol=' + s),
  ticker24h:     s => tryFetch(BINANCE_BASE + '/fapi/v1/ticker/24hr?symbol=' + s),
  premium:       s => tryFetch(BINANCE_BASE + '/fapi/v1/premiumIndex?symbol=' + s),
  klines:    (s,i,l) => tryFetch(BINANCE_BASE + '/fapi/v1/klines?symbol=' + s + '&interval=' + i + '&limit=' + l),
  oiHist:        s => tryFetch(BINANCE_BASE + '/futures/data/openInterestHist?symbol=' + s + '&period=4h&limit=' + CFG.OI_LIMIT),
  oiNow:         s => tryFetch(BINANCE_BASE + '/fapi/v1/openInterest?symbol=' + s),
  smartMoney:    s => tryFetch(BINANCE_BASE + '/futures/data/topLongShortAccountRatio?symbol=' + s + '&period=1h&limit=1'),
  takerSentiment:s => tryFetch(BINANCE_BASE + '/futures/data/takerBuySellVol?symbol=' + s + '&period=1h&limit=1'),
  fearGreed:     () => tryFetch('https://api.alternative.me/fng/?limit=1'),
};

const Y = {
  ticker: async s => {
    const d = await tryFetch(BYBIT_BASE + '/v5/market/tickers?category=linear&symbol=' + s);
    const it = d && d.result && d.result.list && d.result.list[0];
    if (!it) throw new Error('Bybit: no ticker');
    return it;
  },
  klines: async (s, interval, limit) => {
    const iv = BB_INT[interval] || interval;
    const d = await tryFetch(BYBIT_BASE + '/v5/market/kline?category=linear&symbol=' + s + '&interval=' + iv + '&limit=' + limit);
    const list = d && d.result && d.result.list;
    if (!list) throw new Error('Bybit: no klines');
    return list.slice().reverse().map(k => {
      const vals = k.map(Number);
      const t=vals[0],o=vals[1],h=vals[2],l=vals[3],c=vals[4],v=vals[5];
      const rng = h - l;
      const buyVol = rng > 0 ? v * (c - l) / rng : v * 0.5;
      return [t,o,h,l,c,v,0,0,0,buyVol,0,0];
    });
  },
  oiHist: async s => {
    const d = await tryFetch(BYBIT_BASE + '/v5/market/open-interest?category=linear&symbol=' + s + '&intervalTime=4h&limit=' + CFG.OI_LIMIT);
    const list = d && d.result && d.result.list;
    if (!list) throw new Error('Bybit: no OI hist');
    return list.map(x => ({ sumOpenInterest: x.openInterest }));
  },
};

async function fetchPriceFunding(name, symbol) {
  try {
    const r = await Promise.all([B.ticker(symbol), B.premium(symbol)]);
    return { price: parseFloat(r[0].price), funding: parseFloat(r[1].lastFundingRate) * 100, provider: 'Binance' };
  } catch(e) {
    const it = await Y.ticker(symbol);
    return { price: parseFloat(it.lastPrice), funding: parseFloat(it.fundingRate) * 100, provider: 'Bybit' };
  }
}

async function fetchKlines(name, symbol, interval, limit) {
  try { return await B.klines(symbol, interval, limit); }
  catch(e) { return await Y.klines(symbol, interval, limit); }
}

async function fetchMarketPulse(symbols) {
  const tasks = [B.fearGreed(), B.smartMoney('BTCUSDT'), B.takerSentiment('BTCUSDT')]
    .concat(symbols.map(s => B.ticker24h(s)));
  const results = await Promise.allSettled(tasks);
  const fgRes = results[0], smRes = results[1], tsRes = results[2];
  const volResults = results.slice(3);

  let fg = null;
  if (fgRes.status === 'fulfilled') {
    const d = fgRes.value && fgRes.value.data && fgRes.value.data[0];
    if (d) fg = { value: parseInt(d.value), label: d.value_classification };
  }
  let smartMoney = null;
  if (smRes.status === 'fulfilled') {
    const d = smRes.value && smRes.value[0];
    if (d) { const r = parseFloat(d.longShortRatio); smartMoney = { ratio: r, bias: r > 1.1 ? 'long' : r < 0.9 ? 'short' : 'neutral' }; }
  }
  const vols = volResults.filter(r => r.status === 'fulfilled').map(r => parseFloat((r.value && r.value.quoteVolume) || 0));
  const volume24h = vols.length ? vols.reduce((a, b) => a + b, 0) : 0;
  return { volume24h, fg, smartMoney };
}

async function fetchOI(name, symbol) {
  try {
    const hist = await B.oiHist(symbol);
    if (!hist || hist.length < 2) return { oiChange: 0 };
    const oi0 = parseFloat(hist[0].sumOpenInterest);
    const oiN = parseFloat(hist[hist.length-1].sumOpenInterest);
    return { oiChange: oi0 > 0 ? (oiN - oi0) / oi0 * 100 : 0 };
  } catch(e) {
    try {
      const hist = await Y.oiHist(symbol);
      if (!hist || hist.length < 2) return { oiChange: 0 };
      const oi0 = parseFloat(hist[0].sumOpenInterest);
      const oiN = parseFloat(hist[hist.length-1].sumOpenInterest);
      return { oiChange: oi0 > 0 ? (oiN - oi0) / oi0 * 100 : 0 };
    } catch { return { oiChange: 0 }; }
  }
}

// ── Indicators ───────────────────────────────────────────────
function parseKlines(raw) {
  return raw.map(k => ({ Time:k[0]|0,Open:+k[1],High:+k[2],Low:+k[3],Close:+k[4],Volume:+k[5],TotalVol:+k[5],BuyVol:+k[9] }));
}

function calcRsi(df, period) {
  const n = df.length;
  if (n <= period) return 50;
  let avgG = 0, avgL = 0;
  for (let i = 1; i <= period; i++) { const d = df[i].Close - df[i-1].Close; if (d>0) avgG+=d; else avgL-=d; }
  avgG /= period; avgL /= period;
  for (let i = period+1; i < n; i++) {
    const d = df[i].Close - df[i-1].Close;
    avgG = (avgG*(period-1) + Math.max(d,0)) / period;
    avgL = (avgL*(period-1) + Math.max(-d,0)) / period;
  }
  return avgL === 0 ? 100 : 100 - 100/(1 + avgG/avgL);
}

function calcAtr(df, period) {
  if (df.length < period+1) return 0;
  let sum = 0;
  for (let i = 1; i <= period; i++) sum += Math.max(df[i].High-df[i].Low, Math.abs(df[i].High-df[i-1].Close), Math.abs(df[i].Low-df[i-1].Close));
  let atr = sum / period;
  for (let i = period+1; i < df.length; i++) {
    const tr = Math.max(df[i].High-df[i].Low, Math.abs(df[i].High-df[i-1].Close), Math.abs(df[i].Low-df[i-1].Close));
    atr = (atr*(period-1) + tr) / period;
  }
  return atr;
}

function calcEma(df, span) {
  if (!df.length) return 0;
  const k = 2/(span+1); let ema = df[0].Close;
  for (let i = 1; i < df.length; i++) ema = df[i].Close*k + ema*(1-k);
  return ema;
}

function calcPocAvwap(df) {
  if (!df.length) return { poc:0, avwap:0 };
  const closes = df.map(k => k.Close);
  const lo = Math.min.apply(null, closes), hi = Math.max.apply(null, closes);
  if (lo === hi) {
    const v = df.reduce((s,k) => s+k.Volume, 0);
    return { poc:lo, avwap: v>0 ? df.reduce((s,k) => s+k.Close*k.Volume, 0)/v : lo };
  }
  const nbins = 15, bsz = (hi-lo)/nbins, bins = new Float64Array(nbins);
  for (const k of df) { let idx = Math.floor((k.Close-lo)/bsz); if (idx>=nbins) idx=nbins-1; bins[idx]+=k.Volume; }
  let maxVol=-1, pocIdx=0;
  for (let i=0; i<nbins; i++) if (bins[i]>maxVol) { maxVol=bins[i]; pocIdx=i; }
  const poc = lo + (pocIdx+0.5)*bsz;
  const sumV = df.reduce((s,k)=>s+k.Volume,0), sumPV = df.reduce((s,k)=>s+k.Close*k.Volume,0);
  return { poc, avwap: sumV>0 ? sumPV/sumV : poc };
}

function calcCvd(raw) {
  return raw.reduce((cvd,k) => { const tot=+k[5],buy=+k[9]; return cvd+buy-(tot-buy); }, 0);
}

function calcMarketStructure(df, lookback) {
  if (df.length < lookback+2) return 'Neutral';
  const s = df.slice(-lookback), n = s.length;
  const H = i => s[n-1-i].High, L = i => s[n-1-i].Low;
  if (H(0)>H(2) && H(2)>H(4) && L(0)>L(2) && L(2)>L(4)) return 'Bullish';
  if (H(0)<H(2) && H(2)<H(4) && L(0)<L(2) && L(2)<L(4)) return 'Bearish';
  return 'Neutral';
}

function calcFvg(df, maxGaps) {
  if (df.length < 3) return [];
  const gaps = [], lastClose = df[df.length-1].Close;
  for (let i=1; i<df.length-1; i++) {
    const prev=df[i-1], next=df[i+1];
    if (next.Low > prev.High) {
      const gBot=prev.High, gTop=next.Low;
      let ok=true; for (let j=i+1;j<df.length;j++) if (df[j].Low<gBot){ok=false;break;}
      if (ok) gaps.push({ type:'BULL',bottom:gBot,top:gTop,mid:(gBot+gTop)/2,sizePct:(gTop-gBot)/gBot*100,idx:i });
    }
    if (next.High < prev.Low) {
      const gBot=next.High, gTop=prev.Low;
      let ok=true; for (let j=i+1;j<df.length;j++) if (df[j].High>gTop){ok=false;break;}
      if (ok) gaps.push({ type:'BEAR',bottom:gBot,top:gTop,mid:(gBot+gTop)/2,sizePct:(gTop-gBot)/gBot*100,idx:i });
    }
  }
  gaps.sort((a,b) => Math.abs(a.mid-lastClose)-Math.abs(b.mid-lastClose));
  return gaps.slice(0, maxGaps);
}

function calcDonchian(df, period) {
  if (!df || df.length < period) return null;
  const slice = df.slice(-period);
  let hi=-Infinity, lo=Infinity;
  for (const k of slice) { if (k.High>hi) hi=k.High; if (k.Low<lo) lo=k.Low; }
  const mid=(hi+lo)/2, width=hi-lo;
  return { high:hi, low:lo, mid, width, widthPct: mid>0 ? width/mid*100 : 0 };
}

function donchianPos(price, dc) {
  if (!dc) return 'UNKNOWN';
  const buf = dc.mid * (CFG.DONCHIAN_BREAK_BUFFER_PCT/100);
  if (price > dc.high-buf) return 'BREAK_UP';
  if (price < dc.low+buf)  return 'BREAK_DOWN';
  return 'INSIDE';
}

function calcADX(df, period) {
  period = period || 14;
  const n = df.length;
  if (n < period+2) return { adx:0 };
  const trA=[], pA=[], mA=[];
  for (let i=1;i<n;i++) {
    const h=df[i].High,l=df[i].Low,ph=df[i-1].High,pl=df[i-1].Low,pc=df[i-1].Close;
    trA.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    const up=h-ph, dn=pl-l;
    pA.push(up>dn&&up>0?up:0); mA.push(dn>up&&dn>0?dn:0);
  }
  let aS=trA.slice(0,period).reduce((s,v)=>s+v,0);
  let pS=pA.slice(0,period).reduce((s,v)=>s+v,0);
  let mS=mA.slice(0,period).reduce((s,v)=>s+v,0);
  const dxA=[];
  for (let i=period;i<trA.length;i++) {
    aS=aS-aS/period+trA[i]; pS=pS-pS/period+pA[i]; mS=mS-mS/period+mA[i];
    const pDI=aS>0?pS/aS*100:0, mDI=aS>0?mS/aS*100:0;
    dxA.push({ dx:(pDI+mDI)>0?Math.abs(pDI-mDI)/(pDI+mDI)*100:0 });
  }
  if (dxA.length < period) return { adx:0 };
  let adx = dxA.slice(0,period).reduce((s,v)=>s+v.dx,0)/period;
  for (let i=period;i<dxA.length;i++) adx=(adx*(period-1)+dxA[i].dx)/period;
  return { adx };
}

function calcBB(df) {
  if (df.length < 20) return { bw:0 };
  const slice = df.slice(-20).map(k=>k.Close);
  const mid = slice.reduce((s,v)=>s+v,0)/20;
  const std = Math.sqrt(slice.reduce((s,v)=>s+(v-mid)**2,0)/20);
  const bw = mid>0 ? (mid+2*std-(mid-2*std))/mid*100 : 0;
  return { bw };
}

function calcChange24h(dfFl) {
  if (!dfFl || dfFl.length < 2) return 0;
  const first=dfFl[0].Open, last=dfFl[dfFl.length-1].Close;
  return first>0 ? (last-first)/first*100 : 0;
}

function calcRegime(m) {
  const adx=m.adx&&m.adx.adx||0, bw=m.bbBw||0, dcW=m.dc20&&m.dc20.width||0, atr=m.atr||0;
  const dcAtr=atr>0?dcW/atr:99;
  const squeezed=bw<CFG.SQUEEZE.BB_WIDTH_MAX&&dcAtr<CFG.SQUEEZE.DC_ATR_RATIO_MAX;
  if (squeezed) return 'SQUEEZE';
  if (adx>=22&&m.dc20Pos==='BREAK_UP'&&m.currClose>m.emaFast)   return 'TRENDING_UP';
  if (adx>=22&&m.dc20Pos==='BREAK_DOWN'&&m.currClose<m.emaFast) return 'TRENDING_DOWN';
  if (['BREAK_UP','BREAK_DOWN'].includes(m.dc20Pos)&&bw>CFG.SQUEEZE.BB_WIDTH_MAX*2) return 'EXPANSION';
  if (adx<18&&m.dc20Pos==='INSIDE') return 'RANGING';
  return 'MIXED';
}

function deriveConditions(price,flow,oiChange,poc5d,avwap5d,poc14d,avwap14d,avwap30d,cvd5d,cvd14d,cvd30d,structure30d) {
  const bearMac=[price<avwap14d,price<avwap30d,structure30d==='Bearish',cvd30d<0].filter(Boolean).length;
  const bullMac=[price>avwap14d,price>avwap30d,structure30d==='Bullish',cvd30d>0].filter(Boolean).length;
  const nPoc5d =Math.abs(price-poc5d)/poc5d*100<CFG.POC_NEAR_PCT;
  const nPoc14d=Math.abs(price-poc14d)/poc14d*100<CFG.POC_NEAR_PCT;
  const sBull=price>avwap5d&&cvd5d>0&&flow>0;
  const sBear=price<avwap5d&&cvd5d<0&&flow<0;
  const dBull=price<avwap5d&&cvd5d>0;
  const dBear=price>avwap5d&&cvd5d<0;
  const buyP=flow>CFG.FLOW_STRONG&&oiChange>0&&cvd5d>0;
  const selP=flow<-CFG.FLOW_STRONG&&oiChange<0&&cvd5d<0;
  const shOp=flow<-CFG.FLOW_STRONG&&oiChange>0;
  const sqR =flow>CFG.FLOW_STRONG&&oiChange<0;
  const aAcc=cvd5d>0&&cvd14d>0&&cvd30d>0;
  const aDis=cvd5d<0&&cvd14d<0&&cvd30d<0;
  const bnce=cvd30d<0&&cvd14d<0&&cvd5d>0;
  const corr=cvd30d>0&&cvd14d>0&&cvd5d<0;
  return {bearMac,bullMac,nPoc5d,nPoc14d,sBull,sBear,dBull,dBear,buyP,selP,shOp,sqR,aAcc,aDis,bnce,corr};
}

function fvgStatus(price, g) {
  if (g.bottom<=price&&price<=g.top) return { state:'inside', fillPct:(g.top-g.bottom)>0?(price-g.bottom)/(g.top-g.bottom)*100:0 };
  return { state: Math.abs(price-g.mid)/price*100<1.0?'approach':'far', distPct:Math.abs(price-g.mid)/price*100 };
}

function calcScore(price,atr,rsi,flow,oiChange,poc5d,avwap5d,poc14d,avwap14d,avwap30d,cvd5d,cvd14d,cvd30d,structure4h,structure30d,sweep,fvgList,emaFast,emaSlow,dc20Pos) {
  const {bearMac:bM,bullMac:uM,nPoc5d:nP5,nPoc14d:nP14,sBull,sBear,dBull,dBear,buyP,selP,shOp,sqR,aAcc,aDis,bnce,corr} =
    deriveConditions(price,flow,oiChange,poc5d,avwap5d,poc14d,avwap14d,avwap30d,cvd5d,cvd14d,cvd30d,structure30d);
  let s=0, dir=null;
  if (bM>=3){s+=2.0;dir='SHORT';}else if(uM>=3){s+=2.0;dir='LONG';}
  else if(bM===2&&uM<2){s+=0.8;dir='SHORT';}else if(uM===2&&bM<2){s+=0.8;dir='LONG';}
  if(dir==='LONG'&&sBull)s+=1.5;else if(dir==='SHORT'&&sBear)s+=1.5;
  else if(dir==='LONG'&&dBull)s+=0.5;else if(dir==='SHORT'&&dBear)s+=0.5;
  else if(dir==='LONG'&&sBear)s-=0.5;else if(dir==='SHORT'&&sBull)s-=0.5;
  if(buyP&&dir==='LONG')s+=2.0;else if(selP&&dir==='SHORT')s+=2.0;
  else if(buyP&&dir==='SHORT')s+=0.3;else if(selP&&dir==='LONG')s+=0.3;
  else if(shOp&&dir==='SHORT')s+=0.5;else if(sqR&&dir==='LONG')s+=0.5;
  else {
    const pb=[flow<-CFG.FLOW_PARTIAL,oiChange<-1,cvd5d<0].filter(Boolean).length;
    const pb2=[flow>CFG.FLOW_PARTIAL,oiChange>1,cvd5d>0].filter(Boolean).length;
    if(dir==='SHORT'&&pb===2)s+=0.4;else if(dir==='LONG'&&pb2===2)s+=0.4;
  }
  if(aAcc&&dir==='LONG')s+=1.0;else if(aDis&&dir==='SHORT')s+=1.0;
  else if(corr&&dir==='LONG')s+=0.5;else if(bnce&&dir==='SHORT')s+=0.5;
  else if(aAcc&&dir==='SHORT')s-=0.3;else if(aDis&&dir==='LONG')s-=0.3;
  if(sweep==='SELL_SWP'&&flow>0&&oiChange>0&&dir==='LONG')s+=2.0;
  else if(sweep==='BUY_SWP'&&flow<0&&oiChange<0&&dir==='SHORT')s+=2.0;
  else if(['SELL_SWP','BUY_SWP'].includes(sweep))s+=0.75;
  else if(nP5&&cvd5d>0&&price>avwap5d&&dir==='LONG')s+=1.0;
  else if(nP5&&cvd5d<0&&price<avwap5d&&dir==='SHORT')s+=1.0;
  else if(nP14&&structure4h==='Bullish'&&dir==='LONG')s+=0.5;
  else if(nP14&&structure4h==='Bearish'&&dir==='SHORT')s+=0.5;
  if(emaFast>0&&emaSlow>0){
    if(dir==='LONG'&&emaFast>emaSlow&&price>emaFast)s+=0.5;
    else if(dir==='SHORT'&&emaFast<emaSlow&&price<emaFast)s+=0.5;
    else if(dir==='LONG'&&emaFast<emaSlow&&price<emaFast)s-=0.5;
    else if(dir==='SHORT'&&emaFast>emaSlow&&price>emaFast)s-=0.5;
  }
  const fnB=fvgList.filter(g=>g.type==='BULL'&&['inside','approach'].includes(fvgStatus(price,g).state)&&Math.abs(price-g.mid)/price*100<CFG.FVG_NEAR_PCT);
  const fnBe=fvgList.filter(g=>g.type==='BEAR'&&['inside','approach'].includes(fvgStatus(price,g).state)&&Math.abs(price-g.mid)/price*100<CFG.FVG_NEAR_PCT);
  if(dir==='LONG'&&fnB.length)s+=structure4h!=='Bearish'?0.5:0.25;
  else if(dir==='SHORT'&&fnBe.length)s+=structure4h!=='Bullish'?0.5:0.25;
  const pd1=Math.abs(poc5d-poc14d)/poc14d*100, pd2=Math.abs(poc5d-poc14d)/poc5d*100;
  if(pd1<CFG.POC_CONFLUENCE_PCT&&pd2<CFG.POC_CONFLUENCE_PCT)s+=0.5;
  if(rsi>CFG.RSI_EXTREME_OB)s-=0.5;else if(rsi<CFG.RSI_EXTREME_OS)s-=0.5;
  if(dir==='SHORT'&&oiChange>CFG.OI_SQUEEZE_HIGH)s-=1.0;
  else if(dir==='SHORT'&&oiChange>CFG.OI_SQUEEZE_MED)s-=0.5;
  else if(dir==='LONG'&&oiChange<-CFG.OI_SQUEEZE_HIGH)s-=1.0;
  if(structure4h!==structure30d&&structure4h!=='Neutral'&&structure30d!=='Neutral')s-=0.5;
  if(dir&&dc20Pos==='INSIDE')s-=0.25;
  return { score:Math.max(0,Math.min(10,Math.round(s*100)/100)), direction:dir };
}

async function getAdvancedMetrics(name, symbol) {
  const [raw4h,raw5d,raw14d,raw30d,rawFlow,oi] = await Promise.all([
    fetchKlines(name,symbol,'4h',CFG.KLINES_MAIN),
    fetchKlines(name,symbol,'4h',CFG.KLINES_5D),
    fetchKlines(name,symbol,'4h',CFG.KLINES_14D),
    fetchKlines(name,symbol,'4h',CFG.KLINES_30D),
    fetchKlines(name,symbol,'1h',CFG.FLOW_LIMIT),
    fetchOI(name,symbol),
  ]);
  const df4h=parseKlines(raw4h), df5d=parseKlines(raw5d), df14d=parseKlines(raw14d),
        df30d=parseKlines(raw30d), dfFl=parseKlines(rawFlow);
  const rsi=calcRsi(df4h,CFG.RSI_PERIOD), atr=calcAtr(df4h,CFG.ATR_PERIOD);
  const emaFast=calcEma(df4h,CFG.EMA_FAST), emaSlow=calcEma(df4h,CFG.EMA_SLOW);
  const volAvg=df4h.slice(-(CFG.VOL_AVG_WINDOW+1),-1).reduce((s,k)=>s+k.Volume,0)/CFG.VOL_AVG_WINDOW;
  const volCurr=df4h[df4h.length-1].Volume;
  const last=df4h[df4h.length-1];
  const prev=df4h.slice(0,-1);
  let prevH=-Infinity, prevL=Infinity;
  for (const k of prev){if(k.High>prevH)prevH=k.High;if(k.Low<prevL)prevL=k.Low;}
  let sweep='Neutral';
  if(last.High>prevH&&last.Close<prevH)sweep='BUY_SWP';
  else if(last.Low<prevL&&last.Close>prevL)sweep='SELL_SWP';
  const {poc:poc5d,avwap:avwap5d}=calcPocAvwap(df5d);
  const {poc:poc14d,avwap:avwap14d}=calcPocAvwap(df14d);
  const {poc:poc30d,avwap:avwap30d}=calcPocAvwap(df30d);
  const cvd5d=calcCvd(raw5d), cvd14d=calcCvd(raw14d), cvd30d=calcCvd(raw30d);
  const structure4h=calcMarketStructure(df4h,CFG.STRUCT_LOOKBACK_4H);
  const structure30d=calcMarketStructure(df30d,CFG.STRUCT_LOOKBACK_30D);
  const fvgList=calcFvg(df4h.slice(-CFG.KLINES_FVG),CFG.FVG_MAX_GAPS);
  const sumBuy=dfFl.reduce((s,k)=>s+k.BuyVol,0), sumTotal=dfFl.reduce((s,k)=>s+k.TotalVol,0);
  const flow=sumTotal>0?(sumBuy-(sumTotal-sumBuy))/sumTotal*100:0;
  const adxData=calcADX(df4h), bbData=calcBB(df4h);
  const change24h=calcChange24h(dfFl);
  const dc20=calcDonchian(df4h,CFG.DONCHIAN_PERIOD_SHORT);
  const dc20Pos=donchianPos(last.Close,dc20);
  const sparkRaw=df4h.slice(-17).map(k=>k.Close);
  const spMin=Math.min.apply(null,sparkRaw), spMax=Math.max.apply(null,sparkRaw);
  const sparkline=sparkRaw.map(v=>spMax>spMin?(v-spMin)/(spMax-spMin)*100:50);
  const m={
    rsi,atr,poc5d,avwap5d,poc14d,avwap14d,poc30d,avwap30d,
    sweep,flow,structure4h,structure30d,
    oiChange:oi.oiChange,cvd5d,cvd14d,cvd30d,
    currClose:last.Close,fvgList,emaFast,emaSlow,
    adx:adxData,bbBw:bbData.bw,change24h,dc20,dc20Pos,sparkline,
  };
  m.regime=calcRegime(m);
  return m;
}

// ── Data Builder ─────────────────────────────────────────────
const REGIME_MAP = {
  TRENDING_UP:  {headline:'Bullish trend in progress', sub:'BTC leading higher. Trend setups active — grid bots off.'},
  TRENDING_DOWN:{headline:'Bearish pressure dominant',  sub:'Market selling off on volume. Avoid longs, watch for exhaustion.'},
  RANGING:      {headline:'Market in range',             sub:'Low directional conviction. Grid bots active — wait for breakout confirmation.'},
  SQUEEZE:      {headline:'Volatility compression',      sub:'Tight range detected. Breakout incoming — prepare both sides.'},
  EXPANSION:    {headline:'Breakout in progress',        sub:'Price expanding out of range. Momentum setups active — follow the move.'},
  MIXED:        {headline:'Mixed signals',               sub:'No dominant regime. Reduce size, wait for clearer setup.'},
};

function buildSetupLabel(score, direction) {
  if (!direction) return 'No clear signal';
  const d = direction === 'LONG' ? 'bull' : 'bear';
  if (score >= 8.5) return d === 'bull' ? 'Macro bull + sweep'     : 'Macro bear setup';
  if (score >= 7.5) return d === 'bull' ? 'Breakout retest'        : 'Distribution zone';
  if (score >= 6.5) return d === 'bull' ? 'EMA pullback long'      : 'EMA bounce short';
  if (score >= 5.5) return d === 'bull' ? 'POC confluence hold'    : 'POC resistance test';
  return 'No clear entry';
}

function buildEmaLabel(price, emaFast, emaSlow) {
  if (emaFast>emaSlow&&price>emaFast) return 'BULL';
  if (emaFast<emaSlow&&price<emaFast) return 'BEAR';
  if (emaFast>emaSlow&&price<emaFast) return 'BULL/PULLBACK';
  if (emaFast<emaSlow&&price>emaFast) return 'BEAR/BOUNCE';
  return 'NEUTRAL';
}

window._loadedSymbols = {};

async function fetchAllData() {
  const saved = localStorage.getItem('cim_mobile_symbols');
  const symbols = saved ? JSON.parse(saved) : DEFAULT_SYMBOLS;
  const symVals = Object.values(symbols);

  const [pulse, ...tickerResults] = await Promise.all([
    fetchMarketPulse(symVals),
    ...Object.entries(symbols).map(async ([name, symbol]) => {
      try {
        const pf = await fetchPriceFunding(name, symbol);
        const m  = await getAdvancedMetrics(name, symbol);
        const {score, direction} = calcScore(
          pf.price,m.atr,m.rsi,m.flow,m.oiChange,
          m.poc5d,m.avwap5d,m.poc14d,m.avwap14d,m.avwap30d,
          m.cvd5d,m.cvd14d,m.cvd30d,
          m.structure4h,m.structure30d,m.sweep,m.fvgList,
          m.emaFast,m.emaSlow,m.dc20Pos
        );
        return {ok:true,name,symbol,pf,m,score,direction};
      } catch(e) {
        console.error('['+name+'] failed:',e.message);
        return {ok:false,name};
      }
    })
  ]);

  const ASSETS = [];
  let btcM=null, btcScore=5, btcDir=null;

  for (const res of tickerResults) {
    if (!res.ok) continue;
    const {name,pf,m,score,direction} = res;
    if (name==='BTC'){btcM=m;btcScore=score;btcDir=direction;}
    const bias=direction==='LONG'?'bullish':direction==='SHORT'?'bearish':'neutral';
    const cvdLabel=m.cvd5d>0?'ACC':m.cvd5d<0?'DIS':'LAT';
    const emaLabel=buildEmaLabel(pf.price,m.emaFast,m.emaSlow);
    const isLateral=Math.abs(m.cvd5d)<Math.abs(m.cvd14d)*CFG.CVD_LATERAL_RATIO&&Math.abs(m.flow)<CFG.FLOW_STRONG;
    const gridFit=isLateral?'RECOMMENDED':(m.structure4h==='Neutral'?'CAUTION':'AVOID');
    const nearFvg=m.fvgList.filter(g=>Math.abs(pf.price-g.mid)/pf.price*100<1.0);
    ASSETS.push({
      sym:name, name:SYMBOL_NAMES[name]||name, price:pf.price,
      change24h:parseFloat(m.change24h.toFixed(2)),
      score:parseFloat(score.toFixed(1)), bias, setup:buildSetupLabel(score,direction),
      regime:m.regime, gridFit, rsi:parseFloat(m.rsi.toFixed(1)),
      flow:parseFloat(m.flow.toFixed(1)), oi:parseFloat(m.oiChange.toFixed(1)),
      cvd:cvdLabel, structure:m.structure4h, ema:emaLabel, atr:m.atr,
      sparkline:m.sparkline, funding:pf.funding,
      avwap:{
        d5:pf.price>m.avwap5d?'above':'below',
        d14:pf.price>m.avwap14d?'above':'below',
        d30:pf.price>m.avwap30d?'above':'below',
      },
      poc:{ d5:m.poc5d, d14:m.poc14d, confluence:Math.abs(m.poc5d-m.poc14d)/m.poc14d*100<CFG.POC_CONFLUENCE_PCT },
      fvg:{ near:nearFvg.length>0, confirmed:nearFvg.length>0&&((nearFvg[0].type==='BULL'&&m.structure4h!=='Bearish')||(nearFvg[0].type==='BEAR'&&m.structure4h!=='Bullish')), side:nearFvg.length>0?nearFvg[0].type.toLowerCase():null },
    });
  }

  ASSETS.sort((a,b)=>b.score-a.score);

  const GRID_CANDIDATES = ASSETS.filter(a=>a.gridFit==='RECOMMENDED').map(a=>{
    const lo=Math.min(a.poc.d5,a.poc.d14)*0.98, hi=Math.max(a.poc.d5,a.poc.d14)*1.02;
    const grids=24, capital=parseFloat(localStorage.getItem('gridCapital')||'500');
    const netPerGridPct=Math.max(0.1,Math.round((hi-lo)/lo/grids*100*100)/100);
    return { sym:a.sym,name:a.name,price:a.price,lower:lo,upper:hi,grids,capital,
             netPerGridPct, expectedDailyPct:Math.round(netPerGridPct*3*100)/100, score:a.score };
  });

  const fg=pulse&&pulse.fg||{value:50,label:'Neutral'};
  const sm=pulse&&pulse.smartMoney||{ratio:1.0,bias:'neutral'};
  const vol24hB=pulse&&pulse.volume24h?Math.round(pulse.volume24h/1e9*10)/10:0;

  const usedM=btcM||(ASSETS.length?{regime:'MIXED'}:null);
  const rInfo=usedM&&REGIME_MAP[usedM.regime]||REGIME_MAP.MIXED;
  const btcBias=btcDir==='LONG'?'bullish':btcDir==='SHORT'?'bearish':'neutral';

  return {
    MARKET_PULSE:{
      volume24h:vol24hB,
      fearGreed:{value:fg.value,label:fg.label},
      smartMoney:{bias:sm.bias,ratio:sm.ratio},
      btcDominance:52.1, timestamp:'Updated '+new Date().toLocaleTimeString('en-GB'),
    },
    REGIME:{
      label:usedM&&usedM.regime||'MIXED',
      confidence:Math.round(Math.min(100,btcScore*10)),
      direction:btcBias,
      headline:rInfo.headline, sub:rInfo.sub, since:'—',
    },
    ASSETS, GRID_CANDIDATES, INDICATOR_GLOSSARY,
  };
}

function SwipeableDeck({ theme, items, idx, setIdx, onOpen }) {
  const startX=React.useRef(null);
  const startY=React.useRef(null);
  const isHoriz=React.useRef(false);
  const dragRef=React.useRef(0);
  const [drag,setDrag]=React.useState(0);
  const deckRef=React.useRef(null);

  React.useEffect(()=>{
    const el=deckRef.current; if(!el)return;
    const onStart=e=>{
      startX.current=e.touches[0].clientX;
      startY.current=e.touches[0].clientY;
      isHoriz.current=false;
      dragRef.current=0; setDrag(0);
    };
    const onMove=e=>{
      if(startX.current==null)return;
      const dx=e.touches[0].clientX-startX.current;
      const dy=e.touches[0].clientY-startY.current;
      if(!isHoriz.current && Math.abs(dx)<5 && Math.abs(dy)<5)return;
      if(!isHoriz.current){ isHoriz.current=Math.abs(dx)>Math.abs(dy); }
      if(isHoriz.current){ e.preventDefault(); dragRef.current=dx; setDrag(dx); }
    };
    const onEnd=()=>{
      if(Math.abs(dragRef.current)>60){
        if(dragRef.current<0&&idx<items.length-1)setIdx(i=>Math.min(i+1,items.length-1));
        if(dragRef.current>0&&idx>0)setIdx(i=>Math.max(i-1,0));
      }
      startX.current=null; startY.current=null; isHoriz.current=false;
      dragRef.current=0; setDrag(0);
    };
    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchmove',onMove,{passive:false});
    el.addEventListener('touchend',onEnd,{passive:true});
    return()=>{ el.removeEventListener('touchstart',onStart); el.removeEventListener('touchmove',onMove); el.removeEventListener('touchend',onEnd); };
  },[idx,items.length,setIdx]);

  const onStart=e=>{ startX.current=(e.touches?e.touches[0]:e).clientX; startY.current=(e.touches?e.touches[0]:e).clientY; setDrag(0); };
  const onMove=e=>{ if(startX.current==null)return; setDrag((e.touches?e.touches[0]:e).clientX-startX.current); };
  const onEnd=()=>{
    if(Math.abs(drag)>60){
      if(drag<0&&idx<items.length-1)setIdx(idx+1);
      if(drag>0&&idx>0)setIdx(idx-1);
    }
    startX.current=null; setDrag(0);
  };
  return (
    <div ref={deckRef} style={{padding:'28px 20px 4px',position:'relative',height:280,overflow:'visible',touchAction:'pan-y'}}
      onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}>
      <div style={{position:'relative',height:'100%'}}>
        {items.map((a,i)=>{
          const offset=i-idx;
          if(Math.abs(offset)>2)return null;
          const tone=a.bias==='bullish'?'bull':a.bias==='bearish'?'bear':'neutral';
          const color=tone==='bull'?theme.bull:tone==='bear'?theme.bear:theme.text2;
          const isActive=offset===0;
          const tx=offset*30+(isActive?drag*0.6:0);
          const scale=1-Math.min(0.12,Math.abs(offset)*0.06);
          return (
            <div key={a.sym} onClick={()=>isActive&&onOpen(a)} style={{position:'absolute',inset:0,transform:`translateX(${tx}px) scale(${scale})`,transformOrigin:'center',transition:startX.current?'none':'transform 0.3s cubic-bezier(.2,.9,.3,1.2)',zIndex:20-Math.abs(offset),opacity:Math.abs(offset)>1?0:1,cursor:isActive?'pointer':'default'}}>
              <div style={{width:'100%',height:'100%',background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:20,padding:20,boxShadow:isActive?`0 20px 40px -20px ${color}40,0 4px 20px rgba(0,0,0,0.2)`:'none',position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',inset:0,background:`radial-gradient(600px 160px at 0% 0%,${color}14,transparent 60%)`,pointerEvents:'none'}}/>
                <div style={{position:'relative',height:'100%',display:'flex',flexDirection:'column'}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                    <AssetGlyph sym={a.sym} theme={theme} size={40}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:18,fontWeight:700,letterSpacing:-0.3}}>{a.sym}</div>
                      <div style={{fontSize:11,color:theme.text3}}>{a.name} · perp</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:15,fontWeight:700,fontFamily:TOKENS.font.mono}}>${fmtPrice(a.price)}</div>
                      <Delta value={a.change24h} theme={theme} fs={11}/>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:14,margin:'4px 0 12px'}}>
                    <div style={{fontSize:62,fontWeight:700,color,fontFamily:TOKENS.font.display,letterSpacing:-3,lineHeight:0.85}}>{a.score.toFixed(1)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:theme.text3,letterSpacing:0.8,textTransform:'uppercase',fontFamily:TOKENS.font.mono,marginBottom:4}}>Signal · {a.setup}</div>
                      <Score value={a.score} theme={theme} size="lg"/>
                      <div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
                        <TagPill theme={theme} tone={tone} label={a.bias.toUpperCase()} size="sm" mono/>
                        <TagPill theme={theme} tone="neutral" label={a.regime.replace(/_/g,' ')} size="sm" mono/>
                      </div>
                    </div>
                  </div>
                  <div style={{marginTop:'auto',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,paddingTop:10,borderTop:`1px solid ${theme.border}`}}>
                    <MiniKV theme={theme} k="RSI" v={a.rsi}/>
                    <MiniKV theme={theme} k="Flow" v={(a.flow>=0?'+':'')+a.flow} tone={a.flow>0?'bull':'bear'}/>
                    <MiniKV theme={theme} k="OI" v={(a.oi>=0?'+':'')+a.oi} tone={a.oi>0?'bull':'bear'}/>
                    <MiniKV theme={theme} k="CVD" v={a.cvd} tone={a.cvd==='ACC'?'bull':a.cvd==='DIS'?'bear':'neutral'}/>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:4,marginTop:12}}>
        {items.map((_,i)=>(
          <div key={i} onClick={()=>setIdx(i)} style={{width:i===idx?18:5,height:5,borderRadius:3,background:i===idx?theme.text:theme.border2,cursor:'pointer',transition:'width 0.2s'}}/>
        ))}
      </div>
    </div>
  );
}

            <PulseCardC theme={theme} label="F&G" value={fg.value} sub={fg.label} tone={fg.value>=60?'bull':fg.value<=40?'bear':'warn'}/>
            <PulseCardC theme={theme} label="Smart $" value={sm.ratio?sm.ratio.toFixed(2)+'×':'—'} sub={sm.bias} tone={sm.bias==='long'?'bull':sm.bias==='short'?'bear':'neutral'}/>
            <PulseCardC theme={theme} label="24h Vol" value={'$'+fmtVol(pulse.volume24h)} sub="spot+perp" tone="neutral"/>
          </div>
        </div>
      </div>
      <div style={{padding:'6px 20px 6px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <div>
          <div style={{fontSize:11,color:theme.text3,letterSpacing:1.5,textTransform:'uppercase',fontFamily:TOKENS.font.mono}}>Top setups · {ranked.length}</div>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,fontFamily:TOKENS.font.display,marginTop:3}}>Swipe to review</div>
        </div>
        <span style={{fontSize:12,color:theme.text3,fontFamily:TOKENS.font.mono}}>{String(idx+1).padStart(2,'0')} / {String(ranked.length).padStart(2,'0')}</span>
      </div>
      <SwipeableDeck theme={theme} items={ranked} idx={idx} setIdx={setIdx} onOpen={setDetail}/>
      <div style={{padding:'18px 20px 0'}}><GridCalloutC theme={theme} data={data}/></div>
    </div>
  );
}

function GridC({ theme, data }) {
  const candidates=(data&&data.GRID_CANDIDATES)||[];
  return (
    <div style={{flex:1,overflow:'auto',padding:'18px 20px 100px'}}>
      <div style={{fontSize:11,color:theme.text3,letterSpacing:2,textTransform:'uppercase',fontFamily:TOKENS.font.mono}}>Grid</div>
      <div style={{fontSize:30,fontWeight:700,letterSpacing:-1,fontFamily:TOKENS.font.display,marginTop:2,marginBottom:16}}>Bot candidates</div>
      {candidates.length===0&&<div style={{color:theme.text3,fontSize:13}}>No grid candidates right now. Market is trending — wait for ranging conditions.</div>}
      {candidates.map(g=>(
        <div key={g.sym} style={{marginBottom:12,padding:16,background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:16}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <AssetGlyph sym={g.sym} theme={theme} size={34}/>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700}}>{g.sym}/USDT</div>
              <div style={{fontSize:11,color:theme.text3}}>Arithmetic · {g.grids} grids</div>
            </div>
            <TagPill theme={theme} tone="bull" label="READY" size="sm" mono/>
          </div>
          <GridRangeVis theme={theme} grid={g}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginTop:12,paddingTop:12,borderTop:`1px solid ${theme.border}`}}>
            <KV theme={theme} k="Capital" v={'$'+g.capital}/>
            <KV theme={theme} k="Per grid" v={'+'+g.netPerGridPct+'%'} color={theme.bull}/>
            <KV theme={theme} k="Est/day" v={'+'+g.expectedDailyPct+'%'} color={theme.bull}/>
          </div>
        </div>
      ))}
      {(data&&data.ASSETS||[]).filter(a=>a.gridFit==='AVOID').length>0&&(
        <>
          <div style={{fontSize:13,fontWeight:600,color:theme.text3,marginTop:8,marginBottom:12}}>Not suitable — trending</div>
          {(data.ASSETS).filter(a=>a.gridFit==='AVOID').map(a=>(
            <div key={a.sym} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:14,marginBottom:8}}>
              <AssetGlyph sym={a.sym} theme={theme} size={28}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700}}>{a.sym}</div>
                <div style={{fontSize:11,color:theme.text3}}>{a.regime&&a.regime.replace(/_/g,' ')}</div>
              </div>
              <TagPill theme={theme} tone="bear" label="AVOID" size="sm" mono/>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function RefC({ theme, data }) {
  const [open,setOpen]=React.useState(null);
  const glossary=(data&&data.INDICATOR_GLOSSARY)||[];
  return (
    <div style={{flex:1,overflow:'auto',padding:'18px 20px 100px'}}>
      <div style={{fontSize:11,color:theme.text3,letterSpacing:2,textTransform:'uppercase',fontFamily:TOKENS.font.mono}}>Reference</div>
      <div style={{fontSize:30,fontWeight:700,letterSpacing:-1,fontFamily:TOKENS.font.display,marginTop:2,marginBottom:16}}>Color &amp; glossary</div>
      <div style={{padding:14,background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:14,marginBottom:14}}>
        {[['bull','Bullish','Accumulation · oversold entry'],['bear','Bearish','Distribution · overbought exit'],['warn','Caution','Divergence · watch'],['neutral','Neutral','No clear signal']].map(([t,n,desc],i)=>(
          <div key={t} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderTop:i?`1px solid ${theme.border}`:'none'}}>
            <div style={{width:10,height:10,borderRadius:5,background:t==='bull'?theme.bull:t==='bear'?theme.bear:t==='warn'?theme.warn:theme.text2}}/>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{n}</div><div style={{fontSize:11,color:theme.text2}}>{desc}</div></div>
          </div>
        ))}
      </div>
      <div style={{padding:0,background:theme.surface,border:`1px solid ${theme.border}`,borderRadius:14}}>
        {glossary.map(([term,desc],i)=>(
          <div key={term}>
            <div onClick={()=>setOpen(open===i?null:i)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',cursor:'pointer',borderTop:i?`1px solid ${theme.border}`:'none'}}>
              <span style={{fontSize:13,fontWeight:600,fontFamily:TOKENS.font.mono,letterSpacing:0.3}}>{term}</span>
              <div style={{transform:`rotate(${open===i?180:0}deg)`,transition:'transform 0.2s'}}>{Icon.chevDn(theme.text3)}</div>
            </div>
            {open===i&&<div style={{padding:'0 16px 14px',fontSize:12,color:theme.text2,lineHeight:1.5}}>{desc}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function DockC({ theme, tab, setTab, accent }) {
  const items=[{k:'feed',label:'Feed',I:Icon.pulse},{k:'grid',label:'Grid',I:Icon.grid},{k:'reference',label:'Ref',I:Icon.book}];
  return (
    <div style={{position:'absolute',bottom:14,left:20,right:20,zIndex:30,padding:4,borderRadius:999,background:theme.glass,backdropFilter:'blur(20px)',border:`1px solid ${theme.border2}`,boxShadow:'0 10px 30px rgba(0,0,0,0.3)',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:2}}>
      {items.map(it=>{
        const active=tab===it.k;
        return (
          <button key={it.k} onClick={()=>setTab(it.k)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'10px 0',border:'none',borderRadius:999,background:active?accent:'transparent',color:active?'#fff':theme.text2,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all 0.2s'}}>
            {it.I(active?'#fff':theme.text2)}{it.label}
          </button>
        );
      })}
    </div>
  );
}

function DirectionC({ theme, mode, setMode, accent, data, onRefresh, refreshing }) {
  const [tab,setTab]=React.useState('feed');
  const [idx,setIdx]=React.useState(0);
  const [detail,setDetail]=React.useState(null);
  const ranked=React.useMemo(()=>data&&data.ASSETS?[...data.ASSETS].sort((a,b)=>b.score-a.score):[],[data]);
  return (
    <div style={{width:'100%',height:'100%',background:theme.bg,color:theme.text,fontFamily:TOKENS.font.sans,display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      {tab==='feed'&&<FeedC theme={theme} data={data} ranked={ranked} idx={idx} setIdx={setIdx} setDetail={setDetail} mode={mode} setMode={setMode} onRefresh={onRefresh} refreshing={refreshing}/>}
      {tab==='grid'&&<GridC theme={theme} data={data}/>}
      {tab==='reference'&&<RefC theme={theme} data={data}/>}
      <DockC theme={theme} tab={tab} setTab={setTab} accent={accent||theme.accent}/>
      {detail&&<DetailSheetA theme={theme} asset={detail} onClose={()=>setDetail(null)}/>}
    </div>
  );
}

// ── Loading / Error screens ───────────────────────────────────
function LoadingScreen({ theme }) {
  return (
    <div style={{width:'100vw',height:'100dvh',background:theme.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
      <div style={{width:56,height:56,borderRadius:16,background:`linear-gradient(135deg,${theme.accent},${theme.bull})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:22,fontFamily:TOKENS.font.display,letterSpacing:-0.5}}>C</div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
        <div style={{fontSize:22,fontWeight:700,color:theme.text,fontFamily:TOKENS.font.display,letterSpacing:-0.5}}>CIM · Mobile</div>
        <div style={{fontSize:12,color:theme.text3,letterSpacing:1.5,textTransform:'uppercase',fontFamily:TOKENS.font.mono}}>Fetching live data…</div>
      </div>
      <div style={{display:'flex',gap:6,marginTop:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:6,height:6,borderRadius:3,background:theme.accent,animation:`cim-pulse 1.2s ${i*0.2}s infinite`}}/>
        ))}
      </div>
    </div>
  );
}

function ErrorScreen({ error, onRetry, theme }) {
  return (
    <div style={{width:'100vw',height:'100dvh',background:theme.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20,padding:32}}>
      <div style={{fontSize:32,fontWeight:700,color:theme.text,fontFamily:TOKENS.font.display}}>Connection error</div>
      <div style={{fontSize:13,color:theme.text3,textAlign:'center',lineHeight:1.6}}>{error||'Failed to fetch data from Binance/Bybit.'}</div>
      <button onClick={onRetry} style={{padding:'14px 28px',background:theme.accent,color:'#fff',border:'none',borderRadius:12,fontSize:14,fontWeight:700,cursor:'pointer'}}>Try again</button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [data,setData]=React.useState(null);
  const [loading,setLoading]=React.useState(true);
  const [refreshing,setRefreshing]=React.useState(false);
  const [error,setError]=React.useState(null);
  const [mode,setMode]=React.useState(()=>localStorage.getItem('cim_mode')||'dark');
  const accentKey='indigo';

  const doRefresh=React.useCallback(async (isInitial=false)=>{
    if(isInitial)setLoading(true); else setRefreshing(true);
    setError(null);
    try {
      const d=await fetchAllData();
      window.CIM_DATA=d;
      setData(d);
    } catch(e) {
      console.error('fetchAllData failed:',e);
      if(!data)setError(e.message);
    } finally {
      if(isInitial)setLoading(false); else setRefreshing(false);
    }
  },[data]);

  React.useEffect(()=>{
    doRefresh(true);
    const id=setInterval(()=>doRefresh(false), CFG.REFRESH_INTERVAL_SEC*1000);
    return ()=>clearInterval(id);
  },[]);

  const handleSetMode=m=>{
    setMode(m);
    localStorage.setItem('cim_mode',m);
    document.body.className=m==='light'?'light':'';
  };

  React.useEffect(()=>{ document.body.className=mode==='light'?'light':''; },[mode]);

  const theme={...useTheme(mode),accent:ACCENTS[accentKey][mode]};

  if (loading&&!data) return <LoadingScreen theme={theme}/>;
  if (error&&!data)   return <ErrorScreen error={error} onRetry={()=>doRefresh(true)} theme={theme}/>;

  return (
    <div style={{width:'100vw',height:'100dvh',overflow:'hidden',background:theme.bg}}>
      <DirectionC
        theme={theme} mode={mode} setMode={handleSetMode} accent={theme.accent}
        data={data} onRefresh={()=>doRefresh(false)} refreshing={refreshing}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
